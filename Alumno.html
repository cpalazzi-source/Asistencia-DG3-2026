<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Asistencia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 32px; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.10); text-align: center; }
  .icon { font-size: 3rem; margin-bottom: 12px; }
  h1 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  label { font-size: 0.85rem; color: #444; font-weight: 600; display: block; text-align: left; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1.3rem; letter-spacing: 4px; text-align: center; outline: none; transition: border .2s; }
  input:focus { border-color: #4f46e5; }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; background: #4f46e5; color: #fff; margin-top: 14px; transition: background .2s; }
  .btn:hover { background: #3730a3; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .timer-wrap { margin: 16px 0 8px; }
  .timer-bar-bg { background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; }
  .timer-bar { height: 100%; border-radius: 99px; background: #22c55e; transition: width .5s linear, background .5s; }
  .timer-txt { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
  .result { border-radius: 12px; padding: 20px 16px; margin-top: 20px; font-size: 1rem; font-weight: 600; display: none; }
  .result-ok   { background: #dcfce7; color: #166534; }
  .result-err  { background: #fee2e2; color: #991b1b; }
  .result-warn { background: #fef9c3; color: #854d0e; font-weight: 400; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="card">
  <!-- CONFIG: reemplazar con tu URL de Apps Script ALUMNO -->
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzieJe6OHgBKvdXWmQElfDetwlFdNmUwWY4GD4-8q48NMogOguK9X3jfaJfnw78jW-I/exec";
  </script>

  <div id="vista-form">
    <div class="icon">🎓</div>
    <h1>Registro de Asistencia</h1>
    <p class="subtitle" id="subtitleFecha">Cargando sesión...</p>

    <div class="timer-wrap" id="timerWrap" style="display:none">
      <div class="timer-bar-bg"><div class="timer-bar" id="timerBar"></div></div>
      <div class="timer-txt" id="timerTxt"></div>
    </div>

    <label for="inputLegajo">Ingresá tu número de legajo</label>
    <input id="inputLegajo" type="tel" maxlength="5" placeholder="12345" inputmode="numeric">
    <button class="btn" id="btnRegistrar" onclick="registrar()" disabled>Registrar asistencia</button>
  </div>

  <div id="resultado" class="result"></div>
</div>

<script>
let tokenURL   = null;
let expiryURL  = null;
let timerInt   = null;

function getParams() {
  const p = new URLSearchParams(window.location.search);
  tokenURL  = p.get("token");
  expiryURL = parseInt(p.get("expiry") || "0");
}

function api(params) {
  const url = SCRIPT_URL + "?" + new URLSearchParams(params).toString();
  return fetch(url).then(r => r.json());
}

function mostrarExpirado() {
  clearInterval(timerInt);
  document.getElementById("vista-form").style.display = "none";
  const r = document.getElementById("resultado");
  r.className = "result result-warn";
  r.innerHTML = "⏰ El tiempo para registrar su asistencia expiró.";
  r.style.display = "block";
}

function iniciarTimer() {
  const wrap = document.getElementById("timerWrap");
  wrap.style.display = "block";
  timerInt = setInterval(() => {
    const msLeft = expiryURL - Date.now();
    if (msLeft <= 0) { mostrarExpirado(); return; }
    const pct = (msLeft / (2 * 60 * 1000)) * 100;
    const bar  = document.getElementById("timerBar");
    bar.style.width = pct + "%";
    bar.style.background = pct > 50 ? "#22c55e" : pct > 20 ? "#f59e0b" : "#ef4444";
    const mins = Math.floor(msLeft / 60000);
    const secs = Math.floor((msLeft % 60000) / 1000);
    document.getElementById("timerTxt").textContent = `Tiempo restante: ${mins}:${secs.toString().padStart(2,"0")}`;
  }, 500);
}

async function init() {
  getParams();
  if (!tokenURL || !expiryURL) {
    document.getElementById("subtitleFecha").textContent = "QR inválido o incompleto.";
    return;
  }
  if (Date.now() > expiryURL) { mostrarExpirado(); return; }

  // Consultar estado actual al servidor
  try {
    const res = await api({ action: "getStatus" });
    if (!res.active || !res.vigente) { mostrarExpirado(); return; }
    document.getElementById("subtitleFecha").textContent = "Clase del " + res.fecha;
    document.getElementById("btnRegistrar").disabled = false;
    iniciarTimer();
  } catch {
    document.getElementById("subtitleFecha").textContent = "Error al conectar. Intentá de nuevo.";
  }
}

async function registrar() {
  const legajo = document.getElementById("inputLegajo").value.trim();
  if (legajo.length !== 5 || isNaN(legajo)) {
    mostrarResultado("El legajo debe ser un número de 5 dígitos.", "err");
    return;
  }
  if (Date.now() > expiryURL) { mostrarExpirado(); return; }

  document.getElementById("btnRegistrar").disabled = true;

  try {
    const res = await api({ action: "registerStudent", token: tokenURL, legajo });
    if (res.expired) { mostrarExpirado(); return; }
    mostrarResultado(res.msg, res.ok ? "ok" : "err");
    if (res.ok) {
      clearInterval(timerInt);
      document.getElementById("vista-form").style.display = "none";
    } else {
      document.getElementById("btnRegistrar").disabled = false;
    }
  } catch (e) {
    mostrarResultado("Error de conexión. Intentá de nuevo.", "err");
    document.getElementById("btnRegistrar").disabled = false;
  }
}

function mostrarResultado(msg, type) {
  const r = document.getElementById("resultado");
  r.textContent = msg;
  r.className = "result result-" + type;
  r.style.display = "block";
}

init();
</script>
</body>
</html>
