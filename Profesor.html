<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Asistencia — Profesor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 32px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
  h1 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  label { font-size: 0.85rem; color: #444; font-weight: 600; display: block; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; transition: border .2s; }
  input:focus { border-color: #4f46e5; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 12px; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #3730a3; }
  .btn-danger  { background: #ef4444; color: #fff; }
  .btn-danger:hover  { background: #b91c1c; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .qr-area { text-align: center; margin: 24px 0 8px; }
  #qrcode { display: inline-block; padding: 12px; background: #fff; border: 2px solid #e5e7eb; border-radius: 12px; }
  .timer-bar-wrap { background: #e5e7eb; border-radius: 99px; height: 10px; margin: 12px 0 4px; overflow: hidden; }
  .timer-bar { height: 100%; border-radius: 99px; background: #22c55e; transition: width .5s linear, background .5s; }
  .timer-txt { font-size: 0.95rem; font-weight: 700; color: #374151; text-align: center; margin-bottom: 16px; }
  .status-box { border-radius: 10px; padding: 12px 16px; font-size: 0.9rem; margin-top: 16px; display: none; }
  .status-ok  { background: #dcfce7; color: #166534; }
  .status-err { background: #fee2e2; color: #991b1b; }
  .status-warn{ background: #fef9c3; color: #854d0e; }
  .divider { border: none; border-top: 1.5px solid #e5e7eb; margin: 24px 0; }
  .info-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: #6b7280; margin-bottom: 6px; }
  .info-row span:last-child { font-weight: 600; color: #1a1a2e; }
</style>
</head>
<body>
<div class="card">
  <h1>📋 Panel de Asistencia</h1>
  <p class="subtitle">Sistema de registro por QR — Profesor</p>

  <!-- CONFIG: reemplazar con tu URL de Apps Script PROFESOR-->
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzieJe6OHgBKvdXWmQElfDetwlFdNmUwWY4GD4-8q48NMogOguK9X3jfaJfnw78jW-I/exec";
  </script>

  <div id="seccion-generar">
    <label for="inputCol">Columna de la clase de hoy (ej: S, T, U...)</label>
    <input id="inputCol" type="text" maxlength="3" placeholder="S" style="text-transform:uppercase">
    <button class="btn btn-primary" id="btnGenerar" onclick="generarQR()">Generar QR</button>
  </div>

  <div id="seccion-activa" style="display:none">
    <div class="info-row"><span>Columna activa:</span><span id="infoCol">—</span></div>
    <div class="info-row"><span>Fecha:</span><span id="infoFecha">—</span></div>

    <div class="qr-area">
      <div id="qrcode"></div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="timer-txt" id="timerTxt">2:00</div>

    <hr class="divider">
    <p style="font-size:0.83rem;color:#6b7280;margin-bottom:10px;">
      Una vez que el QR expire, podés cerrar la asistencia manualmente. Esto marcará como <strong>1</strong> (ausente) a todos los alumnos que no registraron presencia.
    </p>
    <button class="btn btn-danger" id="btnCerrar" onclick="cerrarAsistencia()">Cerrar asistencia y marcar ausentes</button>
  </div>

  <div id="statusBox" class="status-box"></div>
</div>

<script>
let timerInterval = null;
let expiryTime    = null;
let activeToken   = null;

function api(params) {
  const url = SCRIPT_URL + "?" + new URLSearchParams(params).toString();
  return fetch(url).then(r => r.json());
}

async function generarQR() {
  const col = document.getElementById("inputCol").value.toUpperCase().trim();
  if (!col) { showStatus("Ingresá la letra de columna.", "err"); return; }

  document.getElementById("btnGenerar").disabled = true;
  showStatus("Generando QR...", "warn");

  try {
    const res = await api({ action: "generateToken", col });
    if (!res.ok) { showStatus(res.msg, "err"); document.getElementById("btnGenerar").disabled = false; return; }

    activeToken = res.token;
    expiryTime  = res.expiry;

    document.getElementById("infoCol").textContent   = res.col;
    document.getElementById("infoFecha").textContent = res.fecha;
    document.getElementById("seccion-generar").style.display = "none";
    document.getElementById("seccion-activa").style.display  = "block";

    // Generar QR — contiene la URL de la página del alumno + token
    document.getElementById("qrcode").innerHTML = "";
const alumnoURL = "https://cpalazzi-source.github.io/Asistencia-DG3-2026/Alumno.html"
                  + "?token=" + encodeURIComponent(res.token)
                  + "&expiry=" + res.expiry;
    new QRCode(document.getElementById("qrcode"), { text: alumnoURL, width: 200, height: 200 });

    showStatus("✅ QR generado. Los alumnos tienen 2 minutos para escanear.", "ok");
    iniciarTimer();
  } catch (e) {
    showStatus("Error de conexión: " + e.message, "err");
    document.getElementById("btnGenerar").disabled = false;
  }
}

function iniciarTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const msLeft = expiryTime - Date.now();
    if (msLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById("timerBar").style.width = "0%";
      document.getElementById("timerBar").style.background = "#ef4444";
      document.getElementById("timerTxt").textContent = "⏰ Tiempo agotado";
      document.getElementById("qrcode").style.opacity = "0.3";
      showStatus("El QR expiró. Podés cerrar la asistencia manualmente.", "warn");
      return;
    }
    const pct = (msLeft / (2 * 60 * 1000)) * 100;
    const bar  = document.getElementById("timerBar");
    bar.style.width = pct + "%";
    bar.style.background = pct > 50 ? "#22c55e" : pct > 20 ? "#f59e0b" : "#ef4444";
    const mins = Math.floor(msLeft / 60000);
    const secs = Math.floor((msLeft % 60000) / 1000);
    document.getElementById("timerTxt").textContent = `${mins}:${secs.toString().padStart(2,"0")}`;
  }, 500);
}

async function cerrarAsistencia() {
  if (!confirm("¿Confirmás el cierre de asistencia? Todos los alumnos sin registro quedarán como ausentes (1).")) return;
  document.getElementById("btnCerrar").disabled = true;
  showStatus("Cerrando asistencia...", "warn");

  try {
    const res = await api({ action: "closeAttendance", adminToken: activeToken });
    if (res.ok) {
      clearInterval(timerInterval);
      showStatus("✅ " + res.msg, "ok");
      setTimeout(() => resetPanel(), 3000);
    } else {
      showStatus(res.msg, "err");
      document.getElementById("btnCerrar").disabled = false;
    }
  } catch (e) {
    showStatus("Error: " + e.message, "err");
    document.getElementById("btnCerrar").disabled = false;
  }
}

function resetPanel() {
  activeToken = null; expiryTime = null;
  document.getElementById("seccion-generar").style.display = "block";
  document.getElementById("seccion-activa").style.display  = "none";
  document.getElementById("inputCol").value = "";
  document.getElementById("btnGenerar").disabled = false;
  document.getElementById("qrcode").innerHTML = "";
  hideStatus();
}

function showStatus(msg, type) {
  const b = document.getElementById("statusBox");
  b.textContent = msg;
  b.className = "status-box status-" + type;
  b.style.display = "block";
}
function hideStatus() { document.getElementById("statusBox").style.display = "none"; }
</script>
</body>
</html>
